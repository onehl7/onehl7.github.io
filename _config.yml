    slug: quantum
    emoji: "🧬"
    image_url: "/assets/images/quantum.png"
  - name: Tech
    slug: tech
    emoji: "💻"
    image_url: "/assets/images/tech.png"
  - name: AI
    slug: ai
    emoji: "🤖"
    image_url: "/assets/images/ai.png"
  - name: Space
    slug: space
    emoji: "🚀"
    image_url: "/assets/images/space.png"