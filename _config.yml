title: "A Curious Mind"
description: "Exploring tech, science, and the cosmos"
timezone: "UTC"

remote_theme: pages-themes/modernist@v0.2.0

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-seo-tag

# URL Structure - This is the crucial fix for post URLs
permalink: /posts/:title.html

# Site Topics - Centralized data for categories
# Use this section to easily update images, names, and other details.
topics:
